name: 'Deploy Python Greetings'
description: 'Deploys python-greetings service to a specified environment'
inputs:
  environment:
    description: 'Environment name: dev, stg, preprod or prod'
    required: true
  port:
    description: 'Port to run the service on'
    required: true
runs:
  using: "composite"
  steps:
    - name: Checkout pipeline repository
      uses: actions/checkout@v4

    - name: Clone python-greetings repository
      uses: actions/checkout@v4
      with:
        repository: mtararujs/python-greetings
        path: python-greetings

    - name: Stop existing service if running
      shell: cmd
      working-directory: python-greetings
      run: pm2 delete greetings-app-${{ inputs.environment }} & EXIT /B 0

    - name: Start service with pm2
      shell: cmd
      working-directory: python-greetings
      run: pm2 start app.py --name greetings-app-${{ inputs.environment }} --interpreter venv\Scripts\python.exe -- --port ${{ inputs.port }}